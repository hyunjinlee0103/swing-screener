name: KOSPI 데이터 업데이트

on:
  schedule:
    # 한국시간 08:50 → UTC 23:50 (전날)
    - cron: "50 23 * * 0-4"
    # 한국시간 16:00 → UTC 07:00
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install finance-datareader pandas numpy requests

      - name: 데이터 수집 실행
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_kospi.py

      - name: kospi_data.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kospi_data.json
          git diff --cached --quiet || git commit -m "chore: KOSPI 데이터 업데이트 $(date +'%Y-%m-%d %H:%M') KST"
          git push
